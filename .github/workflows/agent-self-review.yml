name: Agent Self Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  codex-review:
    name: Codex Self Review
    if: github.event.pull_request.head.repo.fork == false && secrets.OPENAI_API_KEY != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs for PR
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Build Codex prompt
        run: |
          cp .github/agent-prompts/self-review.md .github/agent-prompts/self-review.runtime.md
          {
            echo ""
            echo "Context:"
            echo "- PR number: ${{ github.event.pull_request.number }}"
            echo "- repository: ${{ github.repository }}"
            echo "- base sha: ${{ github.event.pull_request.base.sha }}"
            echo "- head sha: ${{ github.event.pull_request.head.sha }}"
          } >> .github/agent-prompts/self-review.runtime.md

      - name: Run Codex Review
        id: run_codex
        uses: openai/codex-action@0b91f4a2703c23df3102c3f0967d3c6db34eedef # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: drop-sudo
          prompt-file: .github/agent-prompts/self-review.runtime.md

  post-feedback:
    name: Post Agent Review
    needs: codex-review
    if: needs.codex-review.outputs.final_message != ''
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Publish review comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
