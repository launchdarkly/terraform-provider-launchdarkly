# API-coverage drift report (stage 1 of the autogen pipeline — see
# .claude/plans/AUTOGEN_PIPELINE.md).
#
# Diffs the endpoint families of LaunchDarkly's public OpenAPI spec against the
# resources registered in the provider, using the curated mapping at
# scripts/driftreport/mapping.yaml. On drift, posts to a private Slack channel
# via the SLACK_DRIFT_WEBHOOK_URL secret. This repo is PUBLIC, so internal
# drift tracking must not use GitHub issues.
name: API drift report

on:
  # No `schedule:` yet — GitHub fires cron only on the default branch, and this
  # work lives on preview-v3. Add a weekly `schedule:` once v3 becomes `main`.
  workflow_dispatch: # manual runs against any branch

permissions:
  contents: read

jobs:
  drift-report:
    name: Drift report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: "go.mod"
          cache: true
      - run: go mod download
      # Build first: `go run` collapses the tool's exit code (2 = drift) to 1.
      - run: go build -o /tmp/driftreport ./scripts/driftreport
      - name: Run drift report
        id: drift
        run: |
          set +e
          /tmp/driftreport -out drift-report.md
          code=$?
          set -e
          if [ "$code" -ne 0 ] && [ "$code" -ne 2 ]; then
            echo "driftreport failed with exit code $code" >&2
            exit "$code"
          fi
          echo "drift=$([ "$code" -eq 2 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          cat drift-report.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: drift-report
          path: drift-report.md
      # Notify a private Slack channel on drift. The full report stays in the
      # step summary + uploaded artifact (one click from run_url); the message
      # carries only scalar fields so the JSON payload can't be broken by
      # markdown in the report. The Slack Workflow Builder trigger behind
      # SLACK_DRIFT_WEBHOOK_URL should map these variables: message, repo,
      # run_url.
      - name: Notify Slack on drift
        if: steps.drift.outputs.drift == 'true'
        uses: slackapi/slack-github-action@485a9d42d3a73031f12ec201c457e2162c45d02d # v2.0.0
        with:
          webhook: ${{ secrets.SLACK_DRIFT_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            {
              "message": "API coverage drift detected — the provider lags behind the public API. Review the report and decide whether to scaffold.",
              "repo": "${{ github.repository }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
