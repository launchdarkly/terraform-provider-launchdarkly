  - tag: Experiments
    status: triage
    notes: Experimentation-as-code is a plausible future surface; needs product alignment.

  - tag: Feature flags
    status: covered
    resources:
      - launchdarkly_feature_flag
      - launchdarkly_feature_flag_environment

  - tag: Feature flags (beta)
    status: triage
    notes: Beta flag endpoints (e.g. migration safety); revisit when stable.

  - tag: Flag import configurations (beta)
    status: triage
    notes: Vendor importer configs; could become a resource once the importer surface stabilizes.

  - tag: Flag links (beta)
    status: triage

  - tag: Flag triggers
    status: covered
