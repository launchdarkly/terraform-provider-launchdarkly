# Curated mapping of LaunchDarkly OpenAPI endpoint families (spec tags) to
# provider coverage. Consumed by scripts/driftreport (see
# .claude/plans/AUTOGEN_PIPELINE.md).
#
# Statuses:
#   covered — family is modeled by the listed resources/data sources
#   partial — some endpoints modeled; note says what's missing
#   ignored — deliberately not an IaC surface; reason required
#   triage  — acknowledged, coverage decision pending (listed in report, not drift)
#
# A spec tag missing from this file is reported as drift (new API family).
version: 1
families:
  - tag: AI Configs
    status: covered
    resources:
      - launchdarkly_ai_config
      - launchdarkly_ai_config_variation
      - launchdarkly_ai_tool
      - launchdarkly_model_config

  - tag: Access tokens
    status: covered
    resources:
      - launchdarkly_access_token

  - tag: Account members
    status: covered
    resources:
      - launchdarkly_team_member
      - launchdarkly_team_members

  - tag: Account usage (beta)
    status: ignored
    reason: Read-only usage metering/analytics, not a declarative IaC surface.

  - tag: AgentControl
    status: triage
    notes: Large new product area (26 paths). Prime candidate for the first stage-2 scaffolding pilot.

  - tag: Announcements
    status: triage
    notes: In-app announcements; small declarative surface, plausible resource.

  - tag: Applications (beta)
    status: triage
    notes: Application/version metadata for mobile targeting; mostly SDK-populated, declarative value unclear.

  - tag: Approvals
    status: ignored
    reason: Imperative approval-request workflow operations; the declarative side (approval_settings) lives on environment/project resources.

  - tag: Approvals (beta)
    status: ignored
    reason: Same as stable Approvals — runtime workflow, not declarative state.

  - tag: Audit log
    status: ignored
    reason: Read-only audit query API. Subscriptions are covered under Integration audit log subscriptions.

  - tag: Code references
    status: ignored
    reason: Populated by the ld-find-code-refs CLI, not Terraform-managed.

  - tag: Context settings
    status: ignored
    reason: Per-context runtime settings, not declarative configuration.

  - tag: Contexts
    status: partial
    resources:
      - launchdarkly_context_kind
    notes: context-kinds endpoints are covered; context instance/search endpoints are runtime data, intentionally unmodeled.

  - tag: Custom roles
    status: covered
    resources:
      - launchdarkly_custom_role

  - tag: Data Export destinations
    status: covered
    resources:
      - launchdarkly_destination

  - tag: Environments
    status: covered
    resources:
